<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polyglot</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f1115;
        --panel: #1a1d23;
        --text: #e8eaed;
        --muted: #8a8f98;
        --accent: #4f8cff;
        --accent-on: #6aa2ff;
        --danger: #e0584b;
        --ok: #3fb966;
        --border: #2a2f38;
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f7f7f9;
          --panel: #ffffff;
          --text: #1a1d23;
          --muted: #5e636c;
          --border: #e5e7eb;
        }
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
        font-size: 14px;
        -webkit-font-smoothing: antialiased;
      }

      .app {
        height: 100vh;
        display: flex;
        flex-direction: column;
        padding: 14px;
        gap: 10px;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .title {
        font-weight: 600;
        font-size: 16px;
        letter-spacing: -0.01em;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .panel-title {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
      }

      .status-pill {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        color: var(--muted);
      }

      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--muted);
      }

      .dot.on { background: var(--ok); }
      .dot.error { background: var(--danger); }

      label {
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 11px;
        color: var(--muted);
      }

      select {
        appearance: none;
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 7px 10px;
        font-size: 13px;
        font-family: inherit;
      }

      .toggle {
        background: var(--accent);
        color: white;
        border: none;
        border-radius: 8px;
        padding: 11px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 120ms ease;
        margin-top: 4px;
      }

      .toggle:hover { background: var(--accent-on); }
      .toggle.on { background: var(--danger); }
      .toggle:disabled { opacity: 0.6; cursor: not-allowed; }

      .transcript {
        flex: 1;
        overflow-y: auto;
        font-size: 12px;
        line-height: 1.5;
        padding-right: 2px;
        min-height: 0;
      }

      .transcript .line {
        margin-bottom: 5px;
        word-wrap: break-word;
        padding: 3px 6px;
        border-left: 2px solid transparent;
        border-radius: 3px;
      }

      .transcript .outgoing {
        border-left-color: var(--accent);
      }

      .transcript .incoming {
        border-left-color: #b87cff;
      }

      .transcript .source { color: var(--muted); font-style: italic; }
      .transcript .translated { color: var(--text); }

      .err {
        color: var(--danger);
        font-size: 11px;
        min-height: 1em;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <div class="title">Polyglot</div>
      </header>

      <!-- OUTGOING -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">You → them</div>
          <div class="status-pill">
            <span class="dot" id="out-dot"></span>
            <span id="out-status">Off</span>
          </div>
        </div>
        <label>
          They speak
          <select id="target-language">
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="hi">Hindi</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="zh">Chinese</option>
            <option value="pt">Portuguese</option>
            <option value="it">Italian</option>
            <option value="ru">Russian</option>
            <option value="vi">Vietnamese</option>
            <option value="id">Indonesian</option>
            <option value="en">English (testing)</option>
          </select>
        </label>
        <label>
          Send my translated voice to (Meet's mic)
          <select id="out-device"><option value="">Loading…</option></select>
        </label>
        <button id="out-toggle" class="toggle">Start</button>
        <div id="out-error" class="err"></div>
      </div>

      <!-- INCOMING -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">Them → you (always English)</div>
          <div class="status-pill">
            <span class="dot" id="in-dot"></span>
            <span id="in-status">Off</span>
          </div>
        </div>
        <label>
          Hear translation through (your speakers)
          <select id="in-device"><option value="">Loading…</option></select>
        </label>
        <button id="in-toggle" class="toggle">Start</button>
        <div id="in-error" class="err"></div>
        <div style="font-size: 10px; color: var(--muted); margin-top: 2px;">
          Captures audio from Chrome, Comet, Edge, Brave, Arc, etc. Make sure something is playing audio.
        </div>
      </div>

      <!-- TRANSCRIPT -->
      <div class="panel" style="flex: 1; min-height: 0;">
        <div class="panel-title">Transcript</div>
        <div id="transcript" class="transcript"></div>
      </div>
    </div>

    <script>
      const { invoke } = window.__TAURI__.core;
      const { listen } = window.__TAURI__.event;

      // DOM refs
      const dom = {
        out: {
          toggle: document.getElementById('out-toggle'),
          target: document.getElementById('target-language'),
          device: document.getElementById('out-device'),
          dot: document.getElementById('out-dot'),
          status: document.getElementById('out-status'),
          err: document.getElementById('out-error'),
        },
        in: {
          toggle: document.getElementById('in-toggle'),
          device: document.getElementById('in-device'),
          dot: document.getElementById('in-dot'),
          status: document.getElementById('in-status'),
          err: document.getElementById('in-error'),
        },
        transcript: document.getElementById('transcript'),
      };

      const state = {
        outRunning: false,
        inRunning: false,
        currentLines: { outgoing: { source: null, translated: null }, incoming: { source: null, translated: null } },
      };

      function setRunning(direction, running) {
        const d = dom[direction === 'outgoing' ? 'out' : 'in'];
        if (direction === 'outgoing') state.outRunning = running;
        else state.inRunning = running;
        d.toggle.textContent = running ? 'Stop' : 'Start';
        d.toggle.classList.toggle('on', running);
        d.toggle.disabled = false;
        d.device.disabled = running;
        if (direction === 'outgoing') dom.out.target.disabled = running;
      }

      function setStatus(direction, kind, msg) {
        const d = dom[direction === 'outgoing' ? 'out' : 'in'];
        d.dot.className = 'dot' + (kind === 'on' ? ' on' : kind === 'error' ? ' error' : '');
        d.status.textContent = msg;
      }

      async function loadDevices() {
        try {
          const devices = await invoke('get_output_devices');
          const defaultDevice = devices.find((d) => d.isDefault);
          const blackhole = devices.find((d) => /blackhole/i.test(d.name));
          const savedOut = localStorage.getItem('outDevice');
          const savedIn = localStorage.getItem('inDevice');

          for (const which of ['out', 'in']) {
            const sel = dom[which].device;
            const currentValue = sel.value;
            sel.innerHTML = '';
            devices.forEach((dev) => {
              const opt = document.createElement('option');
              opt.value = dev.name;
              opt.textContent = dev.name + (dev.isDefault ? ' (default)' : '');
              sel.appendChild(opt);
            });
            // Restore selection priority: current UI value (if still valid) > saved > preferred default
            let chosen = '';
            if (currentValue && devices.some((d) => d.name === currentValue)) {
              chosen = currentValue;
            } else {
              const saved = which === 'out' ? savedOut : savedIn;
              if (saved && devices.some((d) => d.name === saved)) {
                chosen = saved;
              } else if (which === 'out' && blackhole) {
                chosen = blackhole.name;
              } else if (defaultDevice) {
                chosen = defaultDevice.name;
              }
            }
            sel.value = chosen;
          }
        } catch (e) {
          dom.out.err.textContent = 'Failed to load devices: ' + e;
        }
      }

      dom.out.device.addEventListener('change', () => {
        localStorage.setItem('outDevice', dom.out.device.value);
      });
      dom.in.device.addEventListener('change', () => {
        localStorage.setItem('inDevice', dom.in.device.value);
      });
      // Refresh device list when user clicks a dropdown — picks up newly
      // connected Bluetooth headphones, USB devices, etc.
      dom.out.device.addEventListener('mousedown', () => loadDevices());
      dom.in.device.addEventListener('mousedown', () => loadDevices());

      const savedTarget = localStorage.getItem('targetLanguage');
      if (savedTarget) dom.out.target.value = savedTarget;
      dom.out.target.addEventListener('change', () => {
        localStorage.setItem('targetLanguage', dom.out.target.value);
      });

      dom.out.toggle.addEventListener('click', async () => {
        dom.out.err.textContent = '';
        dom.out.toggle.disabled = true;
        try {
          if (state.outRunning) {
            await invoke('stop_outgoing');
          } else {
            await invoke('start_outgoing', {
              target: dom.out.target.value,
              outputDevice: dom.out.device.value || null,
            });
          }
        } catch (e) {
          dom.out.err.textContent = String(e);
          setStatus('outgoing', 'error', 'Error');
          dom.out.toggle.disabled = false;
        }
      });

      dom.in.toggle.addEventListener('click', async () => {
        dom.in.err.textContent = '';
        dom.in.toggle.disabled = true;
        try {
          if (state.inRunning) {
            await invoke('stop_incoming');
          } else {
            await invoke('start_incoming', {
              outputDevice: dom.in.device.value || null,
            });
          }
        } catch (e) {
          dom.in.err.textContent = String(e);
          setStatus('incoming', 'error', 'Error');
          dom.in.toggle.disabled = false;
        }
      });

      function appendTranscript(direction, kind, delta, done) {
        const slot = state.currentLines[direction][kind];
        let line = slot;
        if (!line) {
          line = document.createElement('div');
          line.className = 'line ' + direction + ' ' + kind;
          dom.transcript.appendChild(line);
          state.currentLines[direction][kind] = line;
        }
        if (delta) line.textContent += delta;
        dom.transcript.scrollTop = dom.transcript.scrollHeight;
        if (done) {
          state.currentLines[direction][kind] = null;
        }
      }

      listen('session-status', (event) => {
        const { direction, running, target, message } = event.payload;
        if (!direction) return;
        setRunning(direction, !!running);
        if (message) {
          dom[direction === 'outgoing' ? 'out' : 'in'].err.textContent = message;
          setStatus(direction, 'error', 'Error');
        } else if (running) {
          const targetUpper = target ? target.toUpperCase() : '';
          setStatus(direction, 'on', direction === 'outgoing' ? `→ ${targetUpper}` : 'EN');
        } else {
          setStatus(direction, 'off', 'Off');
        }
      });

      listen('transcript', (event) => {
        const { direction, kind, delta, done } = event.payload;
        if (!direction || !kind) return;
        appendTranscript(direction, kind, delta, done);
      });

      // Initial state
      loadDevices();
      invoke('get_status').then((s) => {
        setRunning('outgoing', s.outgoing);
        setRunning('incoming', s.incoming);
        setStatus('outgoing', s.outgoing ? 'on' : 'off', s.outgoing ? 'Running' : 'Off');
        setStatus('incoming', s.incoming ? 'on' : 'off', s.incoming ? 'Running' : 'Off');
      }).catch(() => {});
    </script>
  </body>
</html>
